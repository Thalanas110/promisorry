<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Something, somewhere</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="bg"></div>
    <div class="overlay"></div>

    <main class="page">
      <header class="hero">

        <h1>Please check</h1>
        <p class="sub">mhmmm, pleaseeee?~</p>

        <p class="reader-meta" id="readerMeta"></p>
        <h2 id="readerTitle"></h2>
        <pre id="readerBody"></pre>
      </article>

      <footer class="foot">drift &middot; 2026</footer>
    </main>

    <script src="main.js" defer></script>
